<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周会数据看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#333;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;max-width:1200px;margin:0 auto}
h1{text-align:center;font-size:28px;background:linear-gradient(135deg,#b8860b,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{text-align:center;color:#888;font-size:14px;margin-bottom:30px}
.section{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.section-title{font-size:18px;font-weight:700;color:#b8860b;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:inline-block;width:4px;height:20px;background:linear-gradient(180deg,#b8860b,#d4af37);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#faf6eb;color:#b8860b;padding:10px 8px;text-align:right;border-bottom:2px solid #d4af37;font-weight:600}
th:first-child,th:nth-child(2){text-align:left}
td{padding:8px;text-align:right;border-bottom:1px solid #f0f0f0;color:#333}
td:first-child,td:nth-child(2){text-align:left;color:#666}
tr:hover td{background:#faf6eb}
tr.target-row td{font-weight:700;color:#b8860b}
tr.total-row td{font-weight:700;color:#222;border-top:2px solid #ddd}
tr.rate-row td{color:#0a8a6f}
.negative{color:#d32f2f}
.positive{color:#0a8a6f}
.progress-bar{width:100%;height:6px;background:#eee;border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,#b8860b,#d4af37);border-radius:3px;transition:width .5s}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.kpi-card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:15px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.kpi-value{font-size:24px;font-weight:700;background:linear-gradient(135deg,#b8860b,#d4af37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi-label{font-size:12px;color:#888;margin-top:4px}
.actions{text-align:center;margin:30px 0}
.btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#b8860b,#d4af37);color:#fff;font-weight:700;border:none;border-radius:8px;cursor:pointer;font-size:14px;text-decoration:none;margin:0 8px}
.btn:hover{opacity:.9}
.btn-outline{background:transparent;border:2px solid #b8860b;color:#b8860b}
.btn-outline:hover{background:#b8860b;color:#fff}
.note{background:#faf6eb;border-left:3px solid #d4af37;padding:12px 16px;margin-top:20px;border-radius:0 8px 8px 0;font-size:12px;color:#666;line-height:1.8}
.pause-badge{display:inline-block;background:#ffebee;color:#d32f2f;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:600;margin-left:12px}
.footnote{color:#666;font-size:11px;margin-top:8px}
@media(max-width:768px){body{padding:10px}table{font-size:11px}th,td{padding:6px 4px}.kpi-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="app">
  <h1 id="title"></h1>
  <p class="subtitle" id="subtitle"></p>
  <div class="kpi-grid" id="kpiGrid"></div>
  <div id="sections"></div>
  <div class="note" id="notes"></div>
  <div class="actions">
    <button class="btn" onclick="copyAllTables()">复制所有表格</button>
    <button class="btn btn-outline" onclick="downloadCSV()">下载 CSV</button>
  </div>
</div>

<script>
fetch('data.json?t='+Date.now()).then(r=>r.json()).then(render);

function render(D){
  // Meta
  document.getElementById('title').textContent=D.meta.title;
  document.getElementById('subtitle').textContent=
    D.meta.quarter+'目标追踪 · 时间进度 '+D.meta.timeProgress+' · 数据更新于 '+D.meta.updateDate;

  // KPI cards
  const kg=document.getElementById('kpiGrid');
  kg.innerHTML=D.kpi.map(k=>`
    <div class="kpi-card">
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${k.percent}%"></div></div>
    </div>`).join('');

  // Sections
  const sc=document.getElementById('sections');
  sc.innerHTML=D.sections.map(s=>{
    let badge=s.badge?`<span class="pause-badge">${s.badge}</span>`:'';
    let sub=s.subtitleHtml?`<p style="color:#888;font-size:13px;margin-bottom:12px">${s.subtitleHtml}</p>`
            :s.subtitle?`<p style="color:#888;font-size:13px;margin-bottom:12px">${s.subtitle}</p>`:'';
    let foot=s.footnote?`<p class="footnote">${s.footnote}</p>`:'';
    let ths=s.headers.map(h=>`<th>${h}</th>`).join('');
    let trs=s.rows.map(r=>{
      let cls=r.type==='target'?'target-row':r.type==='total'?'total-row':r.type==='rate'?'rate-row':'';
      let negSet=new Set(r.neg||[]);
      let tds=r.data.map((v,i)=>{
        let c=negSet.has(i)?` class="negative"`:'';
        return `<td${c}>${v}</td>`;
      }).join('');
      return `<tr class="${cls}">${tds}</tr>`;
    }).join('');
    return `<div class="section">
      <div class="section-title">${s.title}${badge}</div>
      ${sub}
      <table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
      ${foot}
    </div>`;
  }).join('');

  // Notes
  const nt=document.getElementById('notes');
  nt.innerHTML='<strong style="color:#d4af37">数据计算口径及规则</strong><br>'+D.notes.join('<br>');
}

function copyAllTables(){
  const tables=document.querySelectorAll('table');
  let text='';
  tables.forEach(t=>{
    const section=t.closest('.section');
    const title=section?section.querySelector('.section-title').textContent:'';
    text+='\n'+title+'\n';
    t.querySelectorAll('tr').forEach(r=>{
      const vals=[];
      r.querySelectorAll('th,td').forEach(c=>vals.push(c.textContent.trim()));
      text+=vals.join('\t')+'\n';
    });
    text+='\n';
  });
  navigator.clipboard.writeText(text).then(()=>alert('已复制所有表格到剪贴板！可直接粘贴到飞书/Excel'))
  .catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('已复制！');});
}

function downloadCSV(){
  const tables=document.querySelectorAll('table');
  let csv='\uFEFF';
  tables.forEach(t=>{
    const section=t.closest('.section');
    const title=section?section.querySelector('.section-title').textContent:'';
    csv+=title+'\n';
    t.querySelectorAll('tr').forEach(r=>{
      const vals=[];
      r.querySelectorAll('th,td').forEach(c=>{
        let v=c.textContent.trim().replace(/"/g,'""');
        if(v.includes(',')||v.includes('\n'))v='"'+v+'"';
        vals.push(v);
      });
      csv+=vals.join(',')+'\n';
    });
    csv+='\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='weekly_report_Q1.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
</script>
</body>
</html>
